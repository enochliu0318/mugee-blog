baseURL = 'https://blog.mugee.uk/'
languageCode = 'zh-cn'
title = "MUGEE·首页"
theme = 'hugo-coder'
hasCJKLanguage = true
summaryLength = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 20

[markup.highlight]
  style = 'github-dark'

[params]
  author = "MUGEE"
  info = "一个在 Arch Linux 上写代码的小极客"
  description = "Mugee's personal website"
  keywords = "blog, developer, personal"
  since = 2026

  commit = "https://github.com/enochliu0318/mugee-blog"

  colorScheme = "auto"
  hidecolorschemetoggle = false

  avatarurl = "images/avatar.jpg"

  enableSearch = true

  customSCSS = ["scss/home.scss", "scss/vault.scss"]
  customJS = ["js/vault.js"]

[params.vault]
  title = "保险箱"
  description = "此区域为私人文章，请输入密码后继续浏览。"
  # 默认密码 mugee2026 — 请尽快修改。生成哈希: echo -n '你的密码' | sha256sum
  passwordHash = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"
  sessionHours = 24

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

[[params.social]]
  name = "Instagram"
  icon = "fa-brands fa-instagram fa-2x"
  weight = 1
  url = "https://www.instagram.com/enochliu0318"

[[params.social]]
  name = "Github"
  icon = "fa-brands fa-github fa-2x"
  weight = 2
  url = "https://github.com/enochliu0318"

[[menu.main]]
  name = "文章"
  weight = 1
  url = "/posts/"

[[menu.main]]
  name = "标签"
  weight = 2
  url = "/tags/"

[[menu.main]]
  name = "分类"
  weight = 3
  url = "/categories/"

[[menu.main]]
  name = "作者"
  weight = 4
  url = "/authors/"

[[menu.main]]
  name = "关于"
  weight = 5
  url = "/about/"

[[menu.main]]
  name = "搜索🔎"
  weight = 6
  url = "/search/"

[[menu.main]]
  name = "保险箱"
  weight = 7
  url = "/vault/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # 允许在 markdown 中直接写原生 HTML 标签